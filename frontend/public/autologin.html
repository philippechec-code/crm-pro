<!doctype html>
<meta charset="utf-8">
<title>Auto-login</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script>
  // Place a seeded admin user into localStorage and redirect to the app
  try{
    const user = { id: 1, email: 'admin@crm.fr', role: 'admin', full_name: 'Administrateur' };
    localStorage.setItem('crm_user', JSON.stringify(user));
    // small delay to ensure storage is written in slow environments
    setTimeout(()=> location.href='/', 200);
  }catch(e){ document.body.innerText = 'Auto-login failed: '+ (e.message||e); }
</script>
